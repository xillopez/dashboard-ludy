<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Colexio Ludy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="brand">
    <img src="logo.png" class="logo">
    <div>
      <h1>Colexio Ludy · Ferrol</h1>
      <p>Educación Infantil e Primaria</p>
    </div>
  </div>
  <div class="clock">
    <div id="hora"></div>
    <div id="data"></div>
  </div>
</header>

<main class="layout">
  <section class="card tempo">
    <h2>🌤 Tempo en Ferrol</h2>
    <div class="tempo-wrap">
      <div class="icon">🌤️</div>
      <div>
        <div class="temp">18°C</div>
        <div class="small">Parcialmente nubrado</div>
      </div>
    </div>
  </section>

  <section class="card avisos">
    <h2>📢 Avisos</h2>
    <ul>
      <li>Ludyolimpiada · 19 de xuño</li>
      <li>Festa fin de curso · 17 de xuño</li>
      <li>Acto despedida 6º · 26 de xuño</li>
    </ul>
  </section>

  <section class="card calendario">
    <h2>📅 Calendario de xuño</h2>
    <img src="calendario-xuno.jpg" class="calendar-img">
  </section>

  <section class="card menu">
    <h2>🍽 Menú do día</h2>
    <div id="menuDia"></div>
  </section>
</main>
<script src="script.js"></script>
</body></html>
