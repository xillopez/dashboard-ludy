<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Colexio Ludy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<div class="brand">COLEXIO LUDY · FERROL</div>
<div class="clock">
<div id="hora"></div>
<div id="data"></div>
</div>
</header>

<main>
<section class="weather card">
<h2>🌤️ Tempo en Ferrol</h2>
<div id="temp">--°C</div>
<div id="estado">Cargando...</div>
</section>

<section class="notice card">
<h2>📢 Avisos</h2>
<div id="aviso"></div>
</section>

<section class="calendar card">
<h2>📅 Calendario de xuño</h2>
<img src="calendario-xuno.jpg" alt="Calendario">
</section>

<section class="menu card">
<h2>🍽️ Menú do día</h2>
<div id="menu"></div>
</section>
</main>

<script src="script.js"></script>
</body>
</html>
