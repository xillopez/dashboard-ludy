<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colexio Ludy - Panel Informativo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<div class="logo"><h1>COLEXIO LUDY · FERROL</h1></div>
<div class="reloxo"><div id="hora"></div><div id="data"></div></div>
</header>
<main>
<section class="tempo">
<h2>🌤️ Tempo en Ferrol</h2>
<div class="tempo-principal"><span id="temperatura">--°C</span><span id="estado">Cargando...</span></div>
<div class="temp-min-max"><span id="maxima">Máx: --°C</span><span id="minima">Mín: --°C</span></div>
</section>
<section class="avisos">
<h2>📢 Novidades e avisos</h2>
<div id="avisos-container"></div>
</section>
<section class="eventos">
<h2>📅 Eventos</h2>
<ul><li>Personaliza aquí os eventos do centro.</li></ul>
</section>
<section class="menu">
<h2>🍽️ Menú do comedor</h2>
<div class="menu-dia"><p>Personaliza aquí o menú.</p></div>
</section>
</main>
<footer>Xuntos aprendemos, xuntos medramos ❤️</footer>
<script src="script.js"></script>
</body>
</html>
